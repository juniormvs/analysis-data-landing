user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    upstream fastapi {
        server fastapi:8001;
    }

    upstream django {
        server django:8000;
    }

    upstream frontend {
        server analysis-data-frontend:3000;
    }   

    # Bloco para emissão de certificados (porta 80)
    server {
        listen 80;
        server_name analysisdata.cloud;

        resolver 127.0.0.11 valid=10s;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redireciona todo o tráfego para HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Bloco HTTPS com certificados
    server {
        listen 443 ssl;
        server_name analysisdata.cloud;

        ssl_certificate /etc/letsencrypt/live/analysisdata.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/analysisdata.cloud/privkey.pem;

        # Arquivos estáticos do Django
        location /static/ {
            alias /var/www/static/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000";
            try_files $uri $uri/ =404;
        }

        # Arquivos de mídia do Django
        location /media/ {
            proxy_pass http://django/media/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Front-end (React)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://django/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django API
        location /api/ {
            proxy_pass http://django/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI
        location = /fastapi {
            return 301 /fastapi/;
        }

        location /fastapi/ {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_redirect off;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
