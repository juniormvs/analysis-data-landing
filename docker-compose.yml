version: '3.8'

services:
  db:
    image: postgres:14
    container_name: analysis-data-db
    environment:
      POSTGRES_DB: analysisdata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Mapeia a porta 5433 do host para 5432 do container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s  # Aumentado para 30 segundos

  django:
    build: ./back-end/django-app
    container_name: analysis-data-django
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 config.wsgi:application"
    volumes:
      - ./back-end/django-app:/app
      - static_volume:/app/staticfiles
    environment:
      DB_HOST: db
      DB_NAME: analysisdata
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432  # Porta interna do container do PostgreSQL
      DEBUG: "True"
      SECRET_KEY: sua-chave-secreta-aqui  # Substitua por uma chave segura
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,django,nginx
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  fastapi:
    build: ./back-end/fastapi-app
    container_name: analysis-data-fastapi
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./back-end/fastapi-app:/app
    environment:
      DB_HOST: db
      DB_NAME: analysisdata
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/\")'"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8001"
    restart: unless-stopped

  frontend:
    build: ./front-end
    container_name: analysis-data-frontend
    command: npm start -- --host 0.0.0.0
    volumes:
      - ./front-end:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: analysis-data-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/var/www/static/
    depends_on:
      django:
        condition: service_started
      fastapi:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume: